version: '3.8'

services:
  # Nuestra Base de Datos
  db:
    image: postgres:15-alpine
    container_name: padel_db
    restart: always
    environment:
      POSTGRES_USER: user_padel
      POSTGRES_PASSWORD: password_padel
      POSTGRES_DB: padel_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  # Adminer (Interfaz visual para ver tu base de datos en el navegador)
  adminer:
    image: adminer
    container_name: padel_adminer
    restart: always
    ports:
      - "8081:8080"

volumes:
  db_data: